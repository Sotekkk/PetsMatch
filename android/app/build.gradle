plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '32'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.4.0'
}

android {
    namespace "com.application.petsmatch"
    compileSdk 36
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
        coreLibraryDesugaringEnabled true
    }

    
    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.application.petsmatch"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode 32
        versionName "PetsMatch 1.4.0"
    }

    signingConfigs {
        release {
            keyAlias 'PetsMoutch'
            keyPassword 'nabiloute'
            storeFile file('../../my-release-key.jks')
            storePassword 'nabiloute'
        }
    }

    buildTypes {
        release {
            ndk.debugSymbolLevel = "FULL" 
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation 'com.google.android.gms:play-services-wallet:18.1.3'
    implementation 'com.stripe:stripe-android:20.20.0'
}
apply plugin: 'com.google.gms.google-services'
